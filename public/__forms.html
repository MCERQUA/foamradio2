<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Netlify Forms</title></head>
<body>
<!-- Static decoy for Netlify build-time form detection (Next.js App Router) -->

<form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="quote" />
  <input name="bot-field" />
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <select name="inquiryType"></select>
  <textarea name="message"></textarea>
</form>

</body>
</html>
